<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Grandmaster Clock OS - Ultimate Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            --panel-bg: rgba(30, 41, 59, 0.4);
            --tile-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-white: #f8fafc;
            --text-gray: #94a3b8;
            --p1-neon: #38bdf8;
            --p2-neon: #f43f5e;
            --p1-glow: rgba(56, 189, 248, 0.25);
            --p2-glow: rgba(244, 63, 94, 0.25);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.12);
        }

        body.light-mode {
            --bg-main: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            --panel-bg: rgba(255, 255, 255, 0.75);
            --tile-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(15, 23, 42, 0.08);
            --text-white: #0f172a;
            --text-gray: #64748b;
            --p1-neon: #0284c7;
            --p2-neon: #e11d48;
            --p1-glow: rgba(2, 132, 199, 0.2);
            --p2-glow: rgba(225, 29, 72, 0.2);
            --btn-bg: rgba(15, 23, 42, 0.05);
            --btn-hover: rgba(15, 23, 42, 0.1);
        }

        /* STRIC ANTI-ZOOM AND SCROLL SHIFT FIX */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            outline: none;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg-main);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            transition: background 0.3s ease, color 0.3s ease;
            transform: translateZ(0);
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--p1-neon), var(--p2-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .container { grid-template-columns: 3fr 1fr; }
        }

        .workspace {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .config-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .control-unit {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
            min-width: 120px;
        }

        .control-unit label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            width: 100%;
        }

        /* CLOCKS GRID TILE TIZIMI */
        .clocks-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        @media (min-width: 600px) or (orientation: landscape) {
            .clocks-container {
                flex-direction: row;
                height: 380px;
            }
        }

        .clock-tile {
            flex: 1;
            background: var(--tile-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            height: 100%;
        }

        .clock-tile::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 6px;
            border-radius: 0 0 20px 20px;
            opacity: 0.2;
        }
        .clock-tile.p1::after { background: var(--p1-neon); }
        .clock-tile.p2::after { background: var(--p2-neon); }

        .clock-tile.active.p1 {
            border-color: var(--p1-neon);
            box-shadow: 0 0 25px var(--p1-glow);
            background: rgba(56, 189, 248, 0.04);
        }
        .clock-tile.active.p2 {
            border-color: var(--p2-neon);
            box-shadow: 0 0 25px var(--p2-glow);
            background: rgba(244, 63, 94, 0.04);
        }
        .clock-tile.active::after { opacity: 1; }

        .inverted { transform: rotate(180deg); }

        .meta-text {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        .digits {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .p1 .digits { color: var(--p1-neon); }
        .p2 .digits { color: var(--p2-neon); }

        @media (min-width: 768px) {
            .digits { font-size: 4.8rem; }
        }

        .sub-stats {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--btn-bg);
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--text-gray);
            border: 1px solid var(--border-color);
        }

        .system-controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
            width: 100%;
        }

        .btn-core {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-core:hover { background: var(--btn-hover); }
        .btn-action-go { background: #10b981; border: none; }
        .btn-action-go:hover { background: #059669; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }

        /* SIDEBAR & LOGS */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .widget {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .stream-box {
            list-style: none;
            height: 140px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .stream-box::-webkit-scrollbar { width: 4px; }
        .stream-box::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .stream-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 6px 10px;
            background: var(--btn-bg);
            border-radius: 8px;
            margin-bottom: 5px;
            border: 1px solid var(--border-color);
        }

        /* MUKAMMAL FOCUS / TOURNAMENT REJIMI */
        body.tournament-mode {
            padding: 0;
            justify-content: center;
        }
        body.tournament-mode header,
        body.tournament-mode .config-grid,
        body.tournament-mode .sidebar,
        body.tournament-mode .btn-core:not(#btnTournamentToggle):not(#btnPause):not(#btnStart) {
            display: none !important;
        }

        body.tournament-mode .container {
            max-width: 100vw !important;
            width: 100vw !important;
            height: 100vh !important;
            gap: 0 !important;
        }

        body.tournament-mode .workspace {
            border-radius: 0;
            border: none;
            height: 100vh;
            padding: 10px;
            justify-content: space-between;
        }

        body.tournament-mode .clocks-container {
            height: calc(100vh - 75px) !important;
            flex-direction: row !important;
        }

        body.tournament-mode .clock-tile {
            border-radius: 14px;
        }

        body.tournament-mode .digits {
            font-size: 13vw;
        }

        @media (orientation: portrait) and (max-width: 600px) {
            body.tournament-mode .clocks-container {
                flex-direction: column !important;
            }
            body.tournament-mode .digits {
                font-size: 15vw;
            }
        }

        /* PANIC REJIM PANELI (TSAYTNOT) */
        @keyframes panicBlink {
            0% { background: rgba(244, 63, 94, 0.25); border-color: #f43f5e; }
            100% { background: var(--tile-bg); border-color: var(--border-color); }
        }
        .panic-mode { animation: panicBlink 0.4s infinite alternate !important; }

        /* ULTRA-RELIABLE INTEGRATED GAME OVER OVERLAY (BUZILMAYDIGAN EKRAN) */
        .game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 11, 23, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 99999;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        body.tournament-mode .game-over-screen {
            border-radius: 0;
        }
        .game-over-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-screen h2 {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .game-over-screen p {
            color: var(--text-gray);
            font-size: 1rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .btn-rematch-massive {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            animation: pulseRematch 1.5s infinite alternate;
            transition: transform 0.2s;
        }
        .btn-rematch-massive:active {
            transform: scale(0.98);
        }

        @keyframes pulseRematch {
            0% { box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); }
            100% { box-shadow: 0 10px 40px rgba(16, 185, 129, 0.7); }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <h1><i class="fa-solid fa-chess-knight"></i> GRANDMASTER CLOCK PRO</h1>
    </header>

    <div class="container">
        
        <main class="workspace">
            
            <div class="game-over-screen" id="gameOverPanel">
                <h2 id="winnerText">O'yin Tugadi!</h2>
                <p id="reasonText">Vaqt tugashi sababli match yakunlandi.</p>
                <button class="btn-rematch-massive" onclick="executeRematch()">
                    <i class="fa-solid fa-rotate-left"></i> QAYTA O'YINASH (REMATCH)
                </button>
            </div>

            <div class="config-grid">
                <div class="control-unit">
                    <label>Vaqt Rejimi</label>
                    <select id="timePreset">
                        <option value="60">1 Min (Bullet)</option>
                        <option value="180" selected>3 Min (Blitz)</option>
                        <option value="300">5 Min (Blitz)</option>
                        <option value="600">10 Min (Rapid)</option>
                        <option value="armageddon">Armageddon Rejimi</option>
                    </select>
                </div>

                <div class="control-unit">
                    <label>Inkrement / Delay</label>
                    <input type="number" id="incrementInput" value="2" min="0" max="60">
                </div>

                <div class="control-unit">
                    <label>Tizim standarti</label>
                    <select id="delayMode">
                        <option value="inc" selected>FIDE Fischer (Inc)</option>
                        <option value="delay">Bronstein Delay</option>
                    </select>
                </div>

                <div class="control-unit">
                    <label>Oqlar Ko'rinishi</label>
                    <select id="flipP1" onchange="applyVisualOrientations()">
                        <option value="normal" selected>To'g'ri (0°)</option>
                        <option value="inverted">Teskari (180°)</option>
                    </select>
                </div>

                <div class="control-unit">
                    <label>Qoralar Ko'rinishi</label>
                    <select id="flipP2" onchange="applyVisualOrientations()">
                        <option value="normal">To'g'ri (0°)</option>
                        <option value="inverted" selected>Teskari (180°)</option>
                    </select>
                </div>

                <button class="btn-core" onclick="changeEngineTheme()" style="height:38px; align-self:flex-end;">
                    <i class="fa-solid fa-circle-half-stroke"></i> Theme
                </button>
            </div>

            <div class="clocks-container" id="clocksContainer">
                <div class="clock-tile p1" id="blockP1" onclick="handleTap(1)" ondblclick="triggerHandicap(1)">
                    <div class="meta-text">Oqlar (Player 1)</div>
                    <div class="digits" id="timerP1">03:00</div>
                    <div class="sub-stats">
                        <span class="pill" id="movesP1">Yurish: 0</span>
                        <span class="pill" id="speedP1">0.0s/mv</span>
                    </div>
                </div>

                <div class="clock-tile p2" id="blockP2" onclick="handleTap(2)" ondblclick="triggerHandicap(2)">
                    <div class="meta-text">Qoralar (Player 2)</div>
                    <div class="digits" id="timerP2">03:00</div>
                    <div class="sub-stats">
                        <span class="pill" id="movesP2">Yurish: 0</span>
                        <span class="pill" id="speedP2">0.0s/mv</span>
                    </div>
                </div>
            </div>

            <div class="system-controls">
                <button class="btn-core btn-action-go" id="btnStart" onclick="startClockEngine()">
                    <i class="fa-solid fa-play"></i> Boshlash
                </button>
                <button class="btn-core" id="btnPause" onclick="pauseClockEngine()" style="display:none; background:#d97706; border:none;">
                    <i class="fa-solid fa-pause"></i> Pauza (<span id="pauseLimitLabel">3</span>)
                </button>
                <button class="btn-core" onclick="resetClockEngine()">
                    <i class="fa-solid fa-rotate"></i> Tozalash
                </button>
                <button class="btn-core" id="btnTournamentToggle" onclick="toggleTournamentFocus()">
                    <i class="fa-solid fa-expand"></i> Focus Mode
                </button>
            </div>
        </main>

        <aside class="sidebar">
            <div class="widget">
                <h3 style="font-size:0.85rem;"><i class="fa-solid fa-clock-rotate-left"></i> Live Match Tarixi</h3>
                <ul class="stream-box" id="historyLog"></ul>
                <button class="btn-core" onclick="copyLogsToClipboard()" style="margin-top:10px; font-size:0.75rem; padding:8px; justify-content:center;">
                    <i class="fa-solid fa-copy"></i> Loglarni nusxalash
                </button>
            </div>
        </aside>

    </div>

    <script>
        const SyncedCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSynthesizedSound(type) {
            if (SyncedCtx.state === 'suspended') SyncedCtx.resume();
            const osc = SyncedCtx.createOscillator();
            const gainNode = SyncedCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(SyncedCtx.destination);

            if (type === 'wood') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(320, SyncedCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, SyncedCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.4, SyncedCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, SyncedCtx.currentTime + 0.05);
                osc.start(); osc.stop(SyncedCtx.currentTime + 0.05);
            } else if (type === 'capture') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, SyncedCtx.currentTime);
                osc.frequency.setValueAtTime(220, SyncedCtx.currentTime + 0.03);
                gainNode.gain.setValueAtTime(0.4, SyncedCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, SyncedCtx.currentTime + 0.08);
                osc.start(); osc.stop(SyncedCtx.currentTime + 0.08);
            } else if (type === 'alert') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(880, SyncedCtx.currentTime);
                gainNode.gain.setValueAtTime(0.06, SyncedCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, SyncedCtx.currentTime + 0.04);
                osc.start(); osc.stop(SyncedCtx.currentTime + 0.04);
            } else if (type === 'siren') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(520, SyncedCtx.currentTime);
                osc.frequency.setValueAtTime(380, SyncedCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.35, SyncedCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, SyncedCtx.currentTime + 0.4);
                osc.start(); osc.stop(SyncedCtx.currentTime + 0.4);
            }
        }
    </script>

    <script>
        let timeP1, timeP2, increment = 2;
        let movesP1 = 0, movesP2 = 0;
        let activePlayer = null;
        let runInterval = null;
        let isRunning = false;
        let delayCountdown = 0;
        let pauseLimits = 3;
        let durationP1 = 0, durationP2 = 0;

        const timerP1 = document.getElementById('timerP1');
        const timerP2 = document.getElementById('timerP2');
        const blockP1 = document.getElementById('blockP1');
        const blockP2 = document.getElementById('blockP2');
        const btnStart = document.getElementById('btnStart');
        const btnPause = document.getElementById('btnPause');
        const historyLog = document.getElementById('historyLog');
        const gameOverPanel = document.getElementById('gameOverPanel');

        function formatEngineTime(seconds) {
            if (seconds <= 0) return "00:00";
            let mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            let secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function engineSetup() {
            if (isRunning) return;
            const selection = document.getElementById('timePreset').value;
            increment = parseInt(document.getElementById('incrementInput').value);

            if (selection === 'armageddon') {
                timeP1 = 300; 
                timeP2 = 240; 
                increment = 2;
                document.getElementById('incrementInput').value = 2;
            } else {
                timeP1 = parseInt(selection);
                timeP2 = parseInt(selection);
            }

            timerP1.textContent = formatEngineTime(timeP1);
            timerP2.textContent = formatEngineTime(timeP2);
            blockP1.classList.remove('panic-mode');
            blockP2.classList.remove('panic-mode');
        }

        document.getElementById('timePreset').addEventListener('change', engineSetup);
        document.getElementById('incrementInput').addEventListener('change', engineSetup);

        function changeEngineTheme() {
            document.body.classList.toggle('light-mode');
            playSynthesizedSound('wood');
        }

        function applyVisualOrientations() {
            if (document.getElementById('flipP1').value === 'inverted') blockP1.classList.add('inverted');
            else blockP1.classList.remove('inverted');

            if (document.getElementById('flipP2').value === 'inverted') blockP2.classList.add('inverted');
            else blockP2.classList.remove('inverted');
        }

        function triggerHandicap(player) {
            if (isRunning || activePlayer !== null) return;
            if (player === 1) {
                timeP1 = Math.max(5, timeP1 + 30);
                timerP1.textContent = formatEngineTime(timeP1);
            } else {
                timeP2 = Math.max(5, timeP2 + 30);
                timerP2.textContent = formatEngineTime(timeP2);
            }
            playSynthesizedSound('capture');
        }

        function startClockEngine() {
            if (isRunning) return;
            isRunning = true;
            btnStart.style.display = 'none';
            btnPause.style.display = 'flex';

            if (activePlayer === null) {
                activePlayer = 1;
                blockP1.classList.add('active');
                delayCountdown = document.getElementById('delayMode').value === 'delay' ? increment : 0;
            }
            playSynthesizedSound('wood');
            clockTicksLoop();
        }

        function clockTicksLoop() {
            clearInterval(runInterval);
            runInterval = setInterval(() => {
                if (delayCountdown > 0) {
                    delayCountdown--;
                    return;
                }

                if (activePlayer === 1) {
                    timeP1--;
                    durationP1++;
                    timerP1.textContent = formatEngineTime(timeP1);
                    if (timeP1 <= 15) { blockP1.classList.add('panic-mode'); playSynthesizedSound('alert'); }
                    if (timeP1 <= 0) finalizeMatch(2, "Oqlar vaqt tugashi tufayli mag'lub bo'ldi.");
                } else {
                    timeP2--;
                    durationP2++;
                    timerP2.textContent = formatEngineTime(timeP2);
                    if (timeP2 <= 15) { blockP2.classList.add('panic-mode'); playSynthesizedSound('alert'); }
                    if (timeP2 <= 0) finalizeMatch(1, "Qoralar vaqt tugashi tufayli mag'lub bo'ldi.");
                }
            }, 1000);
        }

        function handleTap(clicked) {
            if (!isRunning || activePlayer !== clicked) return;

            const captureTrigger = (movesP1 + movesP2) % 6 === 0 && (movesP1 + movesP2) > 0;
            playSynthesizedSound(captureTrigger ? 'capture' : 'wood');

            const mode = document.getElementById('delayMode').value;
            let logNode = document.createElement('li');
            logNode.className = 'stream-item';

            if (activePlayer === 1) {
                if (mode === 'inc') timeP1 += increment;
                timerP1.textContent = formatEngineTime(timeP1);
                movesP1++;
                document.getElementById('movesP1').textContent = `Yurish: ${movesP1}`;
                document.getElementById('speedP1').textContent = `${(durationP1 / movesP1).toFixed(1)}s/mv`;
                if (timeP1 > 15) blockP1.classList.remove('panic-mode');

                logNode.innerHTML = `<span>#${movesP1} Oqlar</span> <span>${formatEngineTime(timeP1)}</span>`;
                historyLog.insertBefore(logNode, historyLog.firstChild);

                activePlayer = 2;
                blockP1.classList.remove('active');
                blockP2.classList.add('active');
            } else {
                if (mode === 'inc') timeP2 += increment;
                timerP2.textContent = formatEngineTime(timeP2);
                movesP2++;
                document.getElementById('movesP2').textContent = `Yurish: ${movesP2}`;
                document.getElementById('speedP2').textContent = `${(durationP2 / movesP2).toFixed(1)}s/mv`;
                if (timeP2 > 15) blockP2.classList.remove('panic-mode');

                logNode.innerHTML = `<span>#${movesP2} Qoralar</span> <span>${formatEngineTime(timeP2)}</span>`;
                historyLog.insertBefore(logNode, historyLog.firstChild);

                activePlayer = 1;
                blockP2.classList.remove('active');
                blockP1.classList.add('active');
            }

            delayCountdown = mode === 'delay' ? increment : 0;
        }

        function pauseClockEngine() {
            if (pauseLimits <= 0) return;
            clearInterval(runInterval);
            isRunning = false;
            pauseLimits--;
            document.getElementById('pauseLimitLabel').textContent = pauseLimits;
            btnStart.style.display = 'flex';
            btnPause.style.display = 'none';
            playSynthesizedSound('wood');
        }

        function resetClockEngine() {
            clearInterval(runInterval);
            isRunning = false;
            activePlayer = null;
            movesP1 = 0; movesP2 = 0;
            durationP1 = 0; durationP2 = 0;
            pauseLimits = 3;
            document.getElementById('pauseLimitLabel').textContent = pauseLimits;
            document.getElementById('movesP1').textContent = `Yurish: 0`;
            document.getElementById('movesP2').textContent = `Yurish: 0`;
            document.getElementById('speedP1').textContent = `0.0s/mv`;
            document.getElementById('speedP2').textContent = `0.0s/mv`;
            blockP1.className = "clock-tile p1";
            blockP2.className = "clock-tile p2";
            btnStart.style.display = 'flex';
            btnPause.style.display = 'none';
            historyLog.innerHTML = '';
            gameOverPanel.classList.remove('show');
            applyVisualOrientations();
            engineSetup();
        }

        function toggleTournamentFocus() {
            document.body.classList.toggle('tournament-mode');
            const icon = document.querySelector('#btnTournamentToggle i');
            if (document.body.classList.contains('tournament-mode')) {
                icon.className = "fa-solid fa-compress";
            } else {
                icon.className = "fa-solid fa-expand";
            }
            playSynthesizedSound('wood');
        }

        // TAYMER NUL BO'LGANDA ISHLAYDIGAN TERMINATOR FUNKSIYA
        function finalizeMatch(winner, reason) {
            clearInterval(runInterval);
            isRunning = false;
            playSynthesizedSound('siren');

            const winLabel = document.getElementById('winnerText');
            winLabel.textContent = winner === 1 ? "Oqlar G'alaba Qozondi!" : "Qoralar G'alaba Qozondi!";
            winLabel.style.color = winner === 1 ? 'var(--p1-neon)' : 'var(--p2-neon)';
            document.getElementById('reasonText').textContent = reason;
            
            // Qayta o'ynash ekranini darhol ochish
            gameOverPanel.classList.add('show');
        }

        function executeRematch() {
            resetClockEngine();
        }

        function copyLogsToClipboard() {
            let entries = historyLog.querySelectorAll('.stream-item');
            if(entries.length === 0) return;
            let logData = "Grandmaster Clock OS - Match Analytics Log:\n";
            entries.forEach(e => { logData += e.innerText.replace("\n", " -> ") + "\n"; });
            navigator.clipboard.writeText(logData).then(() => { alert("Match jurnali buferga nusxalandi!"); });
        }

        applyVisualOrientations();
        engineSetup();
    </script>
</body>
</html>
